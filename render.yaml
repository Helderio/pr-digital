services:
  - type: web
    name: prdigital-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: prdigital-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: prdigital-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: prdigital-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: prdigital-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: prdigital-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: prdigital-db
    databaseName: prdigital
    user: prdigital_user
    plan: free
