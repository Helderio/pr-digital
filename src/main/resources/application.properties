# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_DATABASE:prdigital}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:prdigital_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:prdigital_password}}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:dev-only-change-this-secret-with-at-least-32-chars}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Firecrawl — scraping + extracção de produtos
firecrawl.api.key=${FIRECRAWL_API_KEY:}
firecrawl.api.url=${FIRECRAWL_API_URL:https://api.firecrawl.dev/v2}
firecrawl.api.timeout-seconds=${FIRECRAWL_TIMEOUT_SECONDS:15}

# Multicaixa (placeholder)
multicaixa.api.url=${MULTICAIXA_URL:}
multicaixa.api.key=${MULTICAIXA_KEY:}

# WhatsApp
whatsapp.api.token=${WHATSAPP_TOKEN:}
whatsapp.phone.id=${WHATSAPP_PHONE_ID:}

# CORS (Vite dev + frontends locais)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173,https://prdigital.ao,https://ponteshop.ao}

# Healthcheck
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
